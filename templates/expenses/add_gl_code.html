{% extends 'base.html' %}

{% block content %}
<div class="expense-header">
    GL Code Management
</div>
<div class="expense-content">
    <form method="post">
        {% csrf_token %}
        <h4>Add New GL Code:</h4>
        <div class="form-row">
            <div class="form-group">
                <label for="gl_code"><span class="required">*</span>GL Code:</label>
                <input type="text" id="gl_code" name="gl_code" required>
            </div>
            <div class="form-group">
                <label for="gl_description"><span class="required">*</span>Description:</label>
                <input type="text" id="gl_description" name="gl_description" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="limit_in_millions">Limit (Millions):</label>
                <input type="number" step="0.001" id="limit_in_millions" name="limit_in_millions">
            </div>
            <div class="form-group">
                <label for="limit">Limit:</label>
                <input type="number" step="0.01" id="limit" name="limit">
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn">Save</button>
            <a href="{% url 'gl_code_list' %}" class="btn" style="margin-left: 10px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
