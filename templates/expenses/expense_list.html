{% extends 'base.html' %}

{% block content %}
<div class="expense-header">
    Expense Posting
</div>
<div class="expense-content">
    <div class="search-form">
        <div class="form-group">
            <label>Start Date:</label>
            <input type="text" value="04 Mar 2025">
        </div>
        <div class="form-group">
            <label>End Date:</label>
            <input type="text" value="04 Mar 2025">
        </div>
        <div class="form-group">
            <label>Type:</label>
            <select>
                <option>All</option>
            </select>
        </div>
        <div class="form-group">
            <label>All:</label>
            <select>
                <option>All</option>
            </select>
        </div>
        <div class="form-group">
            <label>Region:</label>
            <select>
                <option>Karachi South</option>
            </select>
        </div>
        <div class="form-group">
            <label>Branch:</label>
            <select>
                <option>0002-I-Main</option>
            </select>
        </div>
        <div class="form-group">
            <label>Cost Center:</label>
            <select>
                <option>Main Branch</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status:</label>
            <select>
                <option>Pending</option>
            </select>
        </div>
        <button class="btn">Search</button>
        <a href="{% url 'add_expense' %}" class="btn" style="margin-left: 10px;">Add New Expense</a>
    </div>
    
    <div style="margin-bottom: 10px;">
        <label>Show</label>
        <select style="width: 60px;">
            <option>All</option>
        </select>
        <label>entries</label>
        <div style="float: right;">
            <label>Search:</label>
            <input type="text">
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cost Center</th>
                <th>Region</th>
                <th>Branch</th>
                <th>Invoice No</th>
                <th>Description</th>
                <th>Vendor/Employee</th>
                <th>Amount</th>
                <th>Tax Amount</th>
                <th>Net Amount</th>
                <th>Created Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="12" style="text-align: center;">waiting for filter</td>
            </tr>
        </tbody>
    </table>
    
    <div style="margin-top: 10px; font-size: 12px;">
        Showing 1 to 1 of 1 entries
        <div class="pagination">
            <a href="#">First</a>
            <a href="#">Previous</a>
            <a href="#">Next</a>
            <a href="#">Last</a>
        </div>
    </div>
</div>
{% endblock %}
