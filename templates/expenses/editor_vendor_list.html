{% extends 'base.html' %}

{% block content %}
<div class="expense-header flex items-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
        <path d="M8 5a1 1 0 100 2h5.586l-1.293 1.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L13.586 5H8z" />
        <path d="M12 15a1 1 0 100-2H6.414l1.293-1.293a1 1 0 10-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L6.414 15H12z" />
    </svg>
    <span>Vendor Management</span>
</div>
<div class="expense-content shadow-sm rounded-md">
    <form method="get" action="{% url 'editor_vendor_list' %}" class="search-form bg-gray-50 rounded-md shadow-sm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="name" value="{{ selected_name }}">
        </div>
        <div class="form-group">
            <label>Type:</label>
            <select name="type">
                <option value="">All</option>
                <option value="Individual" {% if selected_type == 'Individual' %}selected{% endif %}>Individual</option>
                <option value="Company" {% if selected_type == 'Company' %}selected{% endif %}>Company</option>
                <option value="Government" {% if selected_type == 'Government' %}selected{% endif %}>Government</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status:</label>
            <select name="status">
                <option value="">All</option>
                <option value="Active" {% if selected_status == 'Active' %}selected{% endif %}>Active</option>
                <option value="Inactive" {% if selected_status == 'Inactive' %}selected{% endif %}>Inactive</option>
            </select>
            
        </div>
        <button type="submit" class="btn bg-cyan-600 text-white hover:bg-cyan-700 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1 inline" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
